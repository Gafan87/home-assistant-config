entity_config:
  sensor.archer_a5_wan_status:
    name: "Домашний интернет"
    type: sensor
    properties:
      - type: event.open
        value_template: >
          {% if states('sensor.archer_a5_wan_status') in ['connected', 'online', 'up', 'on'] %}
            opened
          {% else %}
            closed
          {% endif %}