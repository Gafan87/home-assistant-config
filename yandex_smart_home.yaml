# yandex_smart_home.yaml
# Только WAN датчик

entity_config:
  # WAN статус интернета
  binary_sensor.archer_a5_wan_status:
    name: "Домашний интернет"
    type: devices.types.sensor.event
    properties:
      - type: devices.properties.event
        entity: binary_sensor.archer_a5_wan_status
        attribute: state
        value_template: "{{ 'connected' if value == 'on' else 'disconnected' }}"