# yandex_smart_home.yaml
entity_config:
  binary_sensor.archer_a5_wan_status:
    name: "Домашний интернет"
    type: sensor
    properties:
      - type: event.open  # Из списка поддерживаемых типов
        entity: binary_sensor.archer_a5_wan_status
        attribute: state
        value_template: "{{ 'opened' if value == 'on' else 'closed' }}"