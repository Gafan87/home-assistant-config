# yandex_smart_home.yaml
# Расширенная конфигурация

entity_config:
  # WAN статус как датчик
  binary_sensor.archer_a5_wan_status:
    name: "Домашний интернет"
    type: sensor
    device_class: connectivity  # Оставляем оригинальный класс
    
  # Дверной датчик
  binary_sensor.door_sensor:
    name: "Входная дверь"
    type: sensor
    device_class: door  # Яндекс поймет как открытие двери
    
  # Температура
  sensor.temperature_sensor:
    name: "Температура в спальне"
    type: sensor
    device_class: temperature
    unit_of_measurement: "°C"