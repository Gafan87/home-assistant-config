# yandex_smart_home.yaml
# Настройки интеграции Yandex Smart Home

# Основная конфигурация
settings:
  cloud_mode: true  # Работа через облако
  # Если хотите отладочные логи:
  # debug: true

# Индивидуальные настройки устройств
entity_config:
  # WAN статус (интернет соединение)
  binary_sensor.archer_a5_wan_status:
    name: "Домашний интернет"
    type: devices.types.sensor.internet
    properties:
      - type: event
        instance: connection_state
        value_template: "{{ 'connected' if value == 'on' else 'disconnected' }}"

  # Дверной датчик (пример правильной настройки)
  binary_sensor.door_sensor:  # Замените на ID вашего датчика
    name: "Входная дверь"
    type: devices.types.sensor.door
    properties:
      - type: event
        instance: open
        value_template: "{{ 'opened' if value == 'on' else 'closed' }}"

  # Пример для датчика температуры (если есть)
  sensor.temperature_sensor:  # Замените на ID вашего датчика
    name: "Температура в спальне"
    type: devices.types.sensor.temperature
    properties:
      - type: float
        instance: temperature
        unit: "celsius"
        value_template: "{{ value | float }}"